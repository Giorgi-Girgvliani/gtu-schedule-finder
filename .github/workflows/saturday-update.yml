name: Saturday Schedule Update

# Run every Saturday at 10:00 UTC (14:00 Tbilisi / UTC+4).
# GTU publishes the next week's timetable on Saturday afternoons, so this
# timing ensures we pick up the fresh files shortly after they appear.
#
# You can also trigger this manually from the Actions tab.
on:
  schedule:
    - cron: "0 10 * * 6"
  workflow_dispatch:

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push the updated JSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build schedule index
        run: python scripts/build_index.py

      - name: Commit and push updated index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule-index.json
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to schedule index — nothing to commit."
          else
            git commit -m "chore: update schedule index $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
